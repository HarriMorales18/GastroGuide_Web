<section class="admin-register">
  <header>
    <p class="kicker">Acceso temporal</p>
    <h1>Registrar administrador</h1>
    <p class="subtitle">
      Este formulario es temporal para crear admins desde el front. Se eliminara luego.
    </p>
  </header>

  <form [formGroup]="adminForm" (ngSubmit)="onSubmit()" class="card">
    <div class="grid">
      <label>
        <span>Nombre</span>
        <input type="text" formControlName="firstName" placeholder="Ana">
      </label>
      <label>
        <span>Apellido</span>
        <input type="text" formControlName="lastName" placeholder="Gomez">
      </label>
      <label>
        <span>Correo</span>
        <input type="email" formControlName="email" placeholder="admin@gastroguide.com">
      </label>
      <label>
        <span>Contrasena</span>
        <input type="password" formControlName="password" placeholder="Minimo 8 caracteres">
      </label>
      <label>
        <span>Tipo de identificacion</span>
        <select formControlName="identificationType">
          <option value="">Selecciona</option>
          <option value="CC">CC</option>
          <option value="CE">CE</option>
          <option value="PAS">PAS</option>
        </select>
      </label>
      <label>
        <span>Numero de identificacion</span>
        <input type="text" formControlName="identificationNumber" placeholder="123456789">
      </label>
      <label>
        <span>Nacionalidad</span>
        <input type="text" formControlName="nationality" placeholder="Colombiana">
      </label>
      <label>
        <span>Telefono</span>
        <input type="tel" formControlName="phoneNumber" placeholder="+573001112233">
      </label>
      <label>
        <span>Fecha de nacimiento</span>
        <input type="date" formControlName="birthDate">
      </label>
      <label>
        <span>Avatar (URL)</span>
        <input type="url" formControlName="avatarUrl" placeholder="https://example.com/avatar.jpg">
      </label>
      <label>
        <span>Admin ID</span>
        <input type="text" formControlName="adminId" placeholder="ADM-003">
      </label>
      <label>
        <span>Departamento</span>
        <input type="text" formControlName="department" placeholder="Operations">
      </label>
      <label>
        <span>Asignado por</span>
        <input type="text" formControlName="assignedBy" placeholder="ADM-001">
      </label>
    </div>

    <div class="state" *ngIf="error()">
      <span>{{ error() }}</span>
    </div>
    <div class="state success" *ngIf="success()">
      <span>Administrador creado con exito.</span>
    </div>

    <button type="submit" [disabled]="isSubmitting()">
      {{ isSubmitting() ? 'Creando...' : 'Crear administrador' }}
    </button>
  </form>
</section>

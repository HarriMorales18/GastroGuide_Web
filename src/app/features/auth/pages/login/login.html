<div class="auth-container">
  <div class="auth-card anime-item">
    
    <div class="auth-header anime-item">
      <h1>GastroGuide</h1>
      <p>Portal para Creadores Culinarios</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
      
      <div class="form-group anime-item">
        <label for="email">Correo Electrónico</label>
        <input 
          id="email" 
          type="email" 
          formControlName="email" 
          placeholder="chef@ejemplo.com"
          [class.invalid]="loginForm.controls.email.invalid && loginForm.controls.email.touched"
        >
      </div>

      <div class="form-group anime-item">
        <label for="password">Contraseña</label>
        <input 
          id="password" 
          type="password" 
          formControlName="password" 
          placeholder="••••••••"
          [class.invalid]="loginForm.controls.password.invalid && loginForm.controls.password.touched"
        >
      </div>

      <button type="submit" class="btn-primary anime-item" [disabled]="isSubmitting()">
        {{ isSubmitting() ? 'Ingresando...' : 'Iniciar Sesión' }}
      </button>

    </form>

    <div class="auth-footer anime-item">
      <a routerLink="/auth/password-recovery" class="link">Solicitar recuperacion de contrasena</a>
    </div>

    <div class="auth-footer anime-item">
      <p>¿Quieres compartir tu talento culinario?</p>
      <a routerLink="/auth/register" class="link">Postúlate como Creador</a>
    </div>

  </div>
</div>

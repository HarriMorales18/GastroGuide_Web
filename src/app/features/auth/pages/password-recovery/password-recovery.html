<div class="auth-container">
  <div class="auth-card anime-item">

    <div class="auth-header anime-item">
      <h1>Recuperar contrasena</h1>
      <p>Enviaremos un enlace al correo registrado.</p>
    </div>

    <form [formGroup]="recoveryForm" (ngSubmit)="onSubmit()" class="auth-form">

      <div class="form-group anime-item">
        <label for="email">Correo Electronico</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="correo@ejemplo.com"
          [class.invalid]="recoveryForm.controls.email.invalid && recoveryForm.controls.email.touched"
        >
      </div>

      <button type="submit" class="btn-primary anime-item" [disabled]="isSubmitting()">
        {{ isSubmitting() ? 'Enviando...' : 'Solicitar recuperacion' }}
      </button>

      <p class="helper-text anime-item" *ngIf="isSent()">
        Revisa tu correo para continuar con el restablecimiento.
      </p>

    </form>

    <div class="auth-footer anime-item">
      <p>¿Ya recuerdas tu contrasena?</p>
      <a routerLink="/auth/login" class="link">Volver al login</a>
    </div>

  </div>
</div>

<div class="auth-container">
  <div class="auth-card anime-item">

    <div class="auth-header anime-item">
      <h1>Nueva contraseña</h1>
      <p>Crea una contraseña segura para tu cuenta de GastroGuide.</p>
    </div>

    <form [formGroup]="resetForm" (ngSubmit)="onSubmit()" class="auth-form">

      <div class="form-group anime-item">
        <label for="newPassword">Contraseña nueva</label>
        <input
          id="newPassword"
          type="password"
          formControlName="newPassword"
          placeholder="Mínimo 8 caracteres"
          [class.invalid]="resetForm.controls.newPassword.invalid && resetForm.controls.newPassword.touched"
        >
        <small class="error-text" *ngIf="resetForm.controls.newPassword.invalid && resetForm.controls.newPassword.touched">
          La contraseña debe tener al menos 8 caracteres.
        </small>
      </div>

      <div class="form-group anime-item">
        <label for="confirmPassword">Confirmar contraseña</label>
        <input
          id="confirmPassword"
          type="password"
          formControlName="confirmPassword"
          placeholder="Repite tu contraseña"
          [class.invalid]="(resetForm.controls.confirmPassword.touched && resetForm.hasError('passwordMismatch'))"
        >
        <small class="error-text" *ngIf="resetForm.controls.confirmPassword.touched && resetForm.hasError('passwordMismatch')">
          Las contraseñas no coinciden.
        </small>
      </div>

      <button type="submit" class="btn-primary anime-item" [disabled]="isSubmitting() || !token">
        {{ isSubmitting() ? 'Guardando...' : 'Restablecer contraseña' }}
      </button>

      <p class="helper-text anime-item" style="color: var(--color-error); text-align: center;" *ngIf="!token">
        Token no detectado. Por favor, usa el enlace enviado a tu correo.
      </p>

    </form>
  </div>
</div>

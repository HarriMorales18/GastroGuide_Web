<div class="auth-container">
  <div class="auth-card anime-item">

    <div class="auth-header anime-item">
      <h1>Restablecer contrasena</h1>
      <p>Ingresa el token recibido y tu nueva contrasena.</p>
    </div>

    <form [formGroup]="resetForm" (ngSubmit)="onSubmit()" class="auth-form">

      <div class="form-group anime-item">
        <label for="token">Token de recuperacion</label>
        <input
          id="token"
          type="text"
          formControlName="token"
          placeholder="Pega el token aqui"
          [readonly]="hasToken()"
          [class.invalid]="resetForm.controls.token.invalid && resetForm.controls.token.touched"
        >
        <p class="helper-text" *ngIf="!hasToken()">
          Este token viene en el correo de recuperacion.
        </p>
      </div>

      <div class="form-group anime-item">
        <label for="newPassword">Nueva contrasena</label>
        <input
          id="newPassword"
          type="password"
          formControlName="newPassword"
          placeholder="Minimo 8 caracteres"
          [class.invalid]="resetForm.controls.newPassword.invalid && resetForm.controls.newPassword.touched"
        >
      </div>

      <button type="submit" class="btn-primary anime-item" [disabled]="isSubmitting()">
        {{ isSubmitting() ? 'Guardando...' : 'Restablecer contrasena' }}
      </button>

    </form>

    <div class="auth-footer anime-item">
      <p>¿Ya tienes acceso?</p>
      <a routerLink="/auth/login" class="link">Volver al login</a>
    </div>

  </div>
</div>

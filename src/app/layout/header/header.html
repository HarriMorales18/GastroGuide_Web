<header class="app-header">
	<div class="brand">
		<div class="logo-mark" aria-hidden="true">GG</div>
		<div class="brand-text">
			<span class="logo">GastroGuide</span>
			<span class="tag">Portal culinario</span>
		</div>
	</div>

	<nav class="nav" aria-label="Primary" *ngIf="section() !== 'none'">
		@if (role() === 'CREATOR' || section() === 'creator') {
			<a routerLink="/creator/all-courses" routerLinkActive="active">Cursos</a>
			<a routerLink="/creator/courses" routerLinkActive="active">Crear Cursos</a>
			<a routerLink="/creator/revenue" routerLinkActive="active">Ingresos</a>
			<a routerLink="/creator/analytics" routerLinkActive="active">Analiticas</a>
			<a routerLink="/creator/course-list" routerLinkActive="active">Lista de Cursos</a>
		} @else if (role() === 'ADMIN' || section() === 'admin') {
			<a routerLink="/admin/users" routerLinkActive="active">Usuarios</a>
			<a routerLink="/admin/list-all-users" routerLinkActive="active">Listar usuarios</a>
			<a routerLink="/admin/review" routerLinkActive="active">Revision</a>
			<a routerLink="/admin/status" routerLinkActive="active">Estado</a>
		}
	</nav>

	<div class="actions" *ngIf="section() !== 'none'">
		<button type="button" class="logout" (click)="logout()">Cerrar sesion</button>
	</div>
</header>
